<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Search System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Student Search System</h1>
            <p class="subtitle">Search for student information quickly and efficiently</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchBox" 
                    placeholder="Search by student name..." 
                    autocomplete="off"
                    class="search-input"
                >
                <div class="search-icon">&#128269;</div>
            </div>
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
            </div>
            <div id="suggestionsContainer" class="suggestions-container hidden">
                <ul id="suggestionsList" class="suggestions-list"></ul>
            </div>
        </div>

        <div id="studentDetails" class="student-details hidden">
            <div class="details-header">
                <h2>Student Details</h2>
                <button id="closeDetails" class="close-btn">&times;</button>
            </div>
            <div id="details" class="details-grid"></div>
        </div>

        <div id="errorMessage" class="error-message hidden"></div>
        <div id="noResults" class="no-results hidden">
            <p>No students found matching your search.</p>
        </div>
    </div>

    <script>
        let debounceTimer;
        const DEBOUNCE_DELAY = 300;

        // DOM elements
        const searchBox = document.getElementById("searchBox");
        const suggestionsContainer = document.getElementById("suggestionsContainer");
        const suggestionsList = document.getElementById("suggestionsList");
        const studentDetails = document.getElementById("studentDetails");
        const detailsContainer = document.getElementById("details");
        const loadingSpinner = document.getElementById("loadingSpinner");
        const errorMessage = document.getElementById("errorMessage");
        const noResults = document.getElementById("noResults");
        const closeDetails = document.getElementById("closeDetails");

        // Event listeners
        searchBox.addEventListener("input", handleSearch);
        closeDetails.addEventListener("click", hideStudentDetails);
        document.addEventListener("click", handleClickOutside);

        function handleSearch() {
            const query = searchBox.value.trim();
            
            // Clear previous timer
            clearTimeout(debounceTimer);
            
            if (query.length === 0) {
                clearSuggestions();
                hideStudentDetails();
                hideError();
                hideNoResults();
                return;
            }
            
            // Show loading spinner
            showLoading();
            
            // Debounce search
            debounceTimer = setTimeout(() => {
                searchStudents(query);
            }, DEBOUNCE_DELAY);
        }

        async function searchStudents(query) {
            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                hideLoading();
                
                if (data.suggestions.length === 0) {
                    showNoResults();
                    clearSuggestions();
                } else {
                    hideNoResults();
                    displaySuggestions(data.suggestions);
                }
                
            } catch (error) {
                hideLoading();
                showError("Failed to search students. Please try again.");
                console.error("Search error:", error);
            }
        }

        function displaySuggestions(suggestions) {
            suggestionsList.innerHTML = "";
            
            suggestions.forEach(suggestion => {
                const li = document.createElement("li");
                li.className = "suggestion-item";
                li.innerHTML = `
                    <div class="suggestion-content">
                        <span class="suggestion-text">${escapeHtml(suggestion)}</span>
                        <span class="suggestion-arrow">&rarr;</span>
                    </div>
                `;
                li.onclick = () => showStudentDetails(suggestion);
                suggestionsList.appendChild(li);
            });
            
            suggestionsContainer.classList.remove("hidden");
        }

        async function showStudentDetails(name) {
            try {
                showLoading();
                clearSuggestions();
                
                const response = await fetch(`/api/student/${encodeURIComponent(name)}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        showError("Student not found");
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                hideLoading();
                displayStudentDetails(data.student_data);
                
            } catch (error) {
                hideLoading();
                showError("Failed to load student details. Please try again.");
                console.error("Details error:", error);
            }
        }

        function displayStudentDetails(studentData) {
            detailsContainer.innerHTML = '';
            
            // Define field display order and formatting
            const fieldOrder = [
                'Sr.N', 'Students Full Name', 'College ID', 'Branch', 'Sec', 'Gender', 
                'DoB', 'YOP SSC', 'SSC %', 'YOP HSSC', 'HSSC %', 
                'DIPLOMA YOP', 'DIPLOMA %', 'SGPA1', 'SGPA2', 'SGPA3', 
                'SGPA4', 'SGPA5', 'AVG ', 'STUDENT MOBILE NO.', 
                'Personal Email ID', 'EMAIL ID', 'Company', 'Domain'
            ];
            
            fieldOrder.forEach(key => {
                if (studentData.hasOwnProperty(key) && hasDisplayValue(studentData[key])) {
                    const detailCard = createDetailCard(key, studentData[key]);
                    detailsContainer.appendChild(detailCard);
                }
            });
            
            studentDetails.classList.remove("hidden");
            studentDetails.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function createDetailCard(key, value) {
            const card = document.createElement("div");
            card.className = "detail-card";
            
            const formattedKey = formatFieldName(key);
            const formattedValue = formatFieldValue(key, value);
            
            card.innerHTML = `
                <div class="detail-header">
                    <h3 class="detail-title">${escapeHtml(formattedKey)}</h3>
                </div>
                <div class="detail-value">${escapeHtml(formattedValue)}</div>
            `;
            
            return card;
        }

        function formatFieldName(key) {
            const fieldLabels = {
                'Sr.N': 'Sr. No.',
                'Students Full Name': 'Student Full Name',
                'College ID': 'College ID',
                'Branch': 'Branch',
                'Sec': 'Section',
                'Gender': 'Gender',
                'DoB': 'Date of Birth',
                'YOP SSC': 'YOP SSC',
                'SSC %': 'SSC %',
                'YOP HSSC': 'YOP HSSC',
                'HSSC %': 'HSSC %',
                'DIPLOMA YOP': 'Diploma YOP',
                'DIPLOMA %': 'Diploma %',
                'SGPA1': 'SGPA 1',
                'SGPA2': 'SGPA 2',
                'SGPA3': 'SGPA 3',
                'SGPA4': 'SGPA 4',
                'SGPA5': 'SGPA 5',
                'AVG ': 'Average',
                'STUDENT MOBILE NO.': 'Student Mobile No.',
                'Personal Email ID': 'Personal Email ID',
                'EMAIL ID': 'College Email ID',
                'Company': 'Company',
                'Domain': 'Domain'
            };

            return fieldLabels[key] || key.trim();
        }

        function formatFieldValue(key, value) {
            if (value === null || value === undefined) return 'N/A';
            if (typeof value === 'number') {
                if (['Sr.N', 'College ID', 'YOP SSC', 'YOP HSSC', 'DIPLOMA YOP', 'STUDENT MOBILE NO.'].includes(key)) {
                    return String(Math.trunc(value));
                }

                return value.toFixed(2);
            }
            if (key.includes('Email') || key === 'EMAIL ID') return String(value).toLowerCase();
            return String(value);
        }

        function hasDisplayValue(value) {
            if (value === null || value === undefined) return false;
            if (typeof value === 'number') return !Number.isNaN(value);
            return String(value).trim() !== '' && String(value).toLowerCase() !== 'nan';
        }

        function hideStudentDetails() {
            studentDetails.classList.add("hidden");
        }

        function clearSuggestions() {
            suggestionsList.innerHTML = "";
            suggestionsContainer.classList.add("hidden");
        }

        function showLoading() {
            loadingSpinner.classList.remove("hidden");
        }

        function hideLoading() {
            loadingSpinner.classList.add("hidden");
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove("hidden");
            setTimeout(hideError, 5000);
        }

        function hideError() {
            errorMessage.classList.add("hidden");
        }

        function showNoResults() {
            noResults.classList.remove("hidden");
        }

        function hideNoResults() {
            noResults.classList.add("hidden");
        }

        function handleClickOutside(event) {
            if (!searchBox.contains(event.target) && !suggestionsContainer.contains(event.target)) {
                clearSuggestions();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Keyboard navigation
        searchBox.addEventListener('keydown', (e) => {
            const items = suggestionsList.querySelectorAll('.suggestion-item');
            let currentIndex = Array.from(items).findIndex(item => item.classList.contains('selected'));
            
            switch(e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    currentIndex = Math.min(currentIndex + 1, items.length - 1);
                    updateSelection(items, currentIndex);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    currentIndex = Math.max(currentIndex - 1, 0);
                    updateSelection(items, currentIndex);
                    break;
                case 'Enter':
                    e.preventDefault();
                    if (currentIndex >= 0 && items[currentIndex]) {
                        items[currentIndex].click();
                    }
                    break;
                case 'Escape':
                    clearSuggestions();
                    searchBox.blur();
                    break;
            }
        });

        function updateSelection(items, selectedIndex) {
            items.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedIndex);
            });
        }
    </script>
</body>
</html>
